name: Nexus CI

on:
  push:
    branches: [main]
    paths:
      - "nexus/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "nexus/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: nexus/pyproject.toml

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Check critical Python errors
        run: ruff check --select E9,F63,F7,F82 osint_toolkit tests

      - name: Test
        run: pytest

      - name: Build package
        run: python -m build
