services:
  nexus-api:
    build:
      context: ./nexus
    env_file:
      - .env
      - .env.users
    environment:
      NEXUS_AUDIT_LOG: /logs/audit.jsonl
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - nexus-output:/home/nexus/.osint-toolkit/output
      - ./logs:/logs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: caddy:2.10-alpine
    env_file: .env
    restart: unless-stopped
    depends_on:
      nexus-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv:ro
      - caddy-data:/data
      - caddy-config:/config

  duckdns:
    image: curlimages/curl:8.16.0
    env_file: .env
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        while true; do
          curl --fail --silent --show-error \
            "https://www.duckdns.org/update?domains=$${DUCKDNS_SUBDOMAIN}&token=$${DUCKDNS_TOKEN}&ip="
          sleep 300
        done

volumes:
  nexus-output:
  caddy-data:
  caddy-config:
